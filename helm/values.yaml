replicaCount: 1

image:
  repository: kubernetesworkshop.azurecr.io/workshop/thomas-slippens/workshopapp
  tag: "0.01"
  # ↑ auto-updated by GitHub Actions on every push
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: acr-workshop-secret
  # secret created by the platform team — do not change

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  host: "changeme.kubernetes.soulsseeker.com"
  # ↑ set by the ApplicationSet automatically — do not edit this
  tls:
    secretName: workshop-app-tls
