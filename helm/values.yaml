replicaCount: 1

image:
  repository: kubernetesworkshop.azurecr.io/workshop/<your-github-username>/workshopapp
  # ↑ participants: replace <your-github-username> with your GitHub username (lowercase)
  tag: "latest"
  # ↑ participants: paste your image tag here after each push
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: acr-workshop-secret
  # secret created by the platform team — do not change

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  host: "changeme.kubernetes.soulsseeker.com"
  # ↑ set by the ApplicationSet automatically — do not edit this
  tls:
    secretName: workshop-wildcard-tls
