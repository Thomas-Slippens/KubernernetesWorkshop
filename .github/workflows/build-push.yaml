name: Build and Push

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "Dockerfile"
  workflow_dispatch:

env:
  REGISTRY: kubernetesworkshop.azurecr.io
  IMAGE_NAME: workshop/${{ github.actor }}/workshopapp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=workshop/$(echo '${{ github.actor }}' | tr '[:upper:]' '[:lower:]')/workshopapp" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Calculate next version
        id: version
        run: |
          CURRENT=$(grep '  tag:' helm/values.yaml | sed 's/.*"\(.*\)"/\1/' | tr -d '"')
          # Strip leading zeros, increment, zero-pad back to 2 decimal places
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          MINOR=$((10#$MINOR + 1))
          NEXT="$MAJOR.$(printf '%02d' $MINOR)"
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Next version: $NEXT"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.tag }}

      - name: Update image tag in values.yaml
        run: |
          TAG=${{ steps.version.outputs.tag }}
          sed -i "s|^  tag:.*|  tag: \"$TAG\"|" helm/values.yaml
          echo "Updated helm/values.yaml to tag: $TAG"

      - name: Commit updated values.yaml
        run: |
          TAG=${{ steps.version.outputs.tag }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          git diff --staged --quiet || git commit -m "release: $TAG"
          git push
